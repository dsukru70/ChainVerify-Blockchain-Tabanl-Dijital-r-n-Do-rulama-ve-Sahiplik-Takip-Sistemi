<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceler - Ürün Doğrulama Sistemi</title>
    <link rel="stylesheet" href="css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white font-[Inter] min-h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="w-full p-6 flex justify-between items-center backdrop-blur-md bg-white/5 shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center font-bold text-xl shadow-lg shadow-purple-500/30">P</div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight">Proceler</h1>
        </div>
        <nav>
            <a href="admin.html" class="text-sm text-gray-300 hover:text-white transition-colors">Üretici Girişi</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto">
        <div class="text-center mb-10 w-full">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Dijital Ürün <span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">Doğrulama</span></h2>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">Ürününüzün orijinalliğini ve geçmişini anında blockchain üzerinden sorgulayın. Güvende kalın.</p>
        </div>

        <!-- Search Box -->
        <div class="w-full max-w-xl group">
            <div class="relative bg-gray-800/50 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-2 shadow-2xl transition-all duration-300 hover:shadow-purple-500/20 hover:border-purple-500/50">
                <form id="verify-form" class="flex items-center relative z-10">
                    <div class="pl-4 pr-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 relative top-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="product-id" class="w-full bg-transparent border-none outline-none text-white text-lg px-2 py-3 placeholder-gray-500" placeholder="Ürün ID veya Seri No girin..." required>
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold py-3 px-6 rounded-xl transition-all transform active:scale-95 flex items-center justify-center gap-2 min-w-[120px]">
                        <span>Doğrula</span>
                        <div id="verify-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    </button>
                </form>
            </div>
        </div>

        <!-- Result Container -->
        <div id="result-container" class="mt-12 w-full max-w-xl hidden transition-all duration-500 ease-out transform translate-y-4 opacity-0"></div>
    </main>

    <!-- Footer -->
    <footer class="p-6 text-center text-sm text-gray-600 border-t border-white/5">
        &copy; 2026 Proceler. Blockchain Tabanlı Doğrulama Sistemi.
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
