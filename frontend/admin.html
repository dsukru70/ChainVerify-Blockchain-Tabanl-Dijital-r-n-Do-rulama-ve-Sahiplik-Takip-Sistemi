<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceler - Üretici Paneli</title>
    <link rel="stylesheet" href="css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-[Inter] min-h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="w-full p-6 flex justify-between items-center bg-gray-900/50 backdrop-blur-md border-b border-gray-800/80 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-green-500 to-emerald-600 flex items-center justify-center font-bold text-xl shadow-lg shadow-green-500/30">P</div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-emerald-500 tracking-tight">Üretici Paneli</h1>
        </div>
        <nav>
            <a href="index.html" class="text-sm border border-gray-700 bg-gray-800/50 hover:bg-gray-700 px-4 py-2 rounded-lg transition-colors">Son Kullanıcı Ekranı</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6 mt-4">
        <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-green-500/20 blur-3xl rounded-full pointer-events-none"></div>

            <h2 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-green-300 to-emerald-500">Yeni Ürün (Mint)</h2>
            <p class="text-gray-400 text-sm mb-8">Ürünü doğrudan blockchain'e kaydederek sahiplik kaydını başlatın.</p>

            <form id="add-product-form" class="space-y-4 relative z-10">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1 pl-1">Benzersiz Ürün ID (Seri No)</label>
                    <input type="text" id="add-id" class="w-full bg-gray-950/80 border border-gray-800/80 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors" placeholder="Örn: PRD-2026-X1" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1 pl-1">Üretici Firma</label>
                    <input type="text" id="add-manufacturer" class="w-full bg-gray-950/80 border border-gray-800/80 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors" placeholder="Örn: Proceler A.Ş." required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1 pl-1">Ürün Modeli</label>
                    <input type="text" id="add-model" class="w-full bg-gray-950/80 border border-gray-800/80 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors" placeholder="Örn: RTX 5090 Ti" required>
                </div>

                <div id="admin-message" class="hidden text-sm p-4 rounded-xl mt-4 border"></div>

                <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-3 mt-6 shadow-lg shadow-green-600/30">
                    <span id="add-btn-text">Blockchain'e Yaz</span>
                    <div id="add-spinner" class="hidden w-5 h-5 border-2 border-white/60 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
        </div>
    </main>

    <footer class="p-6 text-center text-sm text-gray-600">
        &copy; 2026 Proceler
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
